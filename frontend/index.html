<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScamShield Global</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Hero Section -->
  <header class="hero">
    <div class="container">
      <h1>ScamShield Global</h1>
      <p>Protecting You From Scams Worldwide</p>
      <a href="#verify" class="btn-primary">Verify Now</a>
    </div>
  </header>

  <!-- Navigation -->
  <nav class="navbar">
    <ul>
      <li><a href="#alerts">Latest Scam Alerts</a></li>
      <li><a href="#">How to Stay Safe</a></li>
      <li><a href="#verify">Verify</a></li>
      <li><a href="#report">Report</a></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main class="container">
    <!-- Verify Section -->
    <section id="verify" class="card">
      <h2>Verify a Business or Phone Number</h2>
      <form id="verifyForm">
        <input type="text" placeholder="Enter business name or phone number" required>
        <button type="submit" class="btn-primary">Verify</button>
      </form>
      <div id="result"></div>
    </section>

    <!-- Report Section -->
    <section id="report" class="card">
      <h2>Report a Scam</h2>
      <form id="reportForm">
        <input type="text" placeholder="Business/Phone to report" required>
        <textarea placeholder="Describe the scam" required></textarea>
        <button type="submit" class="btn-danger">Submit Report</button>
      </form>
      <div id="reportResult"></div>
    </section>

    <!-- Scam Alerts Section -->
    <section id="alerts" class="card">
      <h2>Latest Scam Alerts</h2>
      <div id="alertsGrid" class="grid"></div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 ScamShield Global. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
