<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScamShield Global</title>
  <link rel="stylesheet" href="style.css"> 
</head>
<body>
  <header>
    <h1>ScamShield Global</h1>
    <p>Protecting You From Scams Worldwide</p>
  </header>

  <nav>
    <ul>
      <li><a href="#">Latest Scam Alerts</a></li>
      <li><a href="#">How to Stay Safe</a></li>
      <li><a href="#">Verify Business/Phone</a></li>
      <li><a href="#">Report a Scam</a></li>
    </ul>
  </nav>

  <main>
    <section id="verify">
      <h2>Verify a Business or Phone Number</h2>
      <form id="verifyForm">
        <input type="text" placeholder="Enter business name or phone number" required>
        <button type="submit">Verify</button>
      </form>
      <div id="result"></div>
    </section>
    <section id="report">
  <h2>Report a Scam</h2>
  <form id="reportForm">
    <input type="text" placeholder="Business/Phone to report" required>
    <textarea placeholder="Describe the scam" required></textarea>
    <button type="submit">Submit Report</button>
  </form>
  <div id="reportResult"></div>
</section> 
  </main>

  <footer>
    <p>&copy; 2026 ScamShield Global. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
